<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>學生資料表</title>
    <style>
        /* 設定表格整體樣式 */
        table {
            /* 1. 框線合併（題目要求） */
            border-collapse: collapse;
            /* 不要設定 width: 100%，讓它像圖片一樣自然寬度 */
            min-width: 300px; 
        }

        /* 2. 設定標題(th)與單元格(td)樣式 */
        th, td {
            border: 1px solid black;
            /* 3. 內距 5px（題目要求） */
            padding: 5px;
            /* 4. 文字靠左（題目要求） */
            text-align: left;
            font-family: serif; /* 圖片中使用的是有襯線字體，如 Times New Roman */
        }

        /* 讓標題加粗 */
        th {
            font-weight: bold;
        }

        /* 調整兩欄寬度比例，模擬圖片視覺 */
        th:first-child, td:first-child {
            width: 120px; /* Name 欄位較窄 */
        }

        th:last-child, td:last-child {
            width: 200px; /* Student ID 欄位較寬 */
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Student ID</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Liang-Ting Liu</td>
                <td>113403541</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
